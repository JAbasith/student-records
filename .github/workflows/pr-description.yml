name: PR Description Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required PR description sections
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || "").toLowerCase();
            const requiredSections = [
              "## what",
              "## why",
              "## how to validate",
              "## related tasks",
              "## dependencies",
              "## context",
              "## validation evidence"
            ];

            const missing = requiredSections.filter((section) => !body.includes(section));

            if (missing.length > 0) {
              core.setFailed(
                `PR description is missing required sections: ${missing.join(", ")}. Please use the pull request template.`
              );
            }

      - name: Validate linked task references
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const jiraRegex = /[A-Z][A-Z0-9]+-\d+/;
            const issueRegex = /(closes|fixes|resolves)\s+#\d+/i;

            if (!jiraRegex.test(body) && !issueRegex.test(body)) {
              core.setFailed(
                "PR description must include at least one task reference (Jira key like ABC-123 or GitHub issue keyword like closes #123)."
              );
            }
