name: Task
about: Create a concrete implementation task derived from an epic.
title: "[TASK] "
labels:
  - task
  - ai-planned
body:
  - type: markdown
    attributes:
      value: |
        Use this template for a small, actionable task that can be completed in a single pull request.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What specific change needs to be made?
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent epic or issue
      description: Link the parent issue that this task belongs to.
      placeholder: "#123 or ABC-123"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Implementation notes
      description: Add any constraints, assumptions, or ordering notes.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Definition of done
      description: How do we know this task is complete?
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation steps
      description: How should the AI PM or developer verify completion?
      placeholder: |
        - ...
        - ...
    validations:
      required: true
