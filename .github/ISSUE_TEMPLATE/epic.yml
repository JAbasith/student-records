name: Epic
about: Create a large goal that the AI project manager can break into tasks.
title: "[EPIC] "
labels:
  - epic
  - ai-planned
body:
  - type: markdown
    attributes:
      value: |
        Use this template for a large outcome that should be decomposed into smaller GitHub issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be delivered?
      placeholder: Describe the outcome in one or two paragraphs.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why this matters
      description: Explain the problem, user value, or business need.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List what is in scope and what is out of scope.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define the conditions for success.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Link related issues, PRs, or external dependencies.
      placeholder: None if not applicable.
    validations:
      required: true
